name: iOS CI

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/ios-ci.yml"

jobs:
  build-ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: iOS compile (no codesign)
        run: flutter build ios --debug --no-codesign
